<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Spottr — simpler 2-plate variant on the same mega geometry: a 25 kg
       red plate sleeved up against the collar with a 20 kg blue plate
       outside it. Reads cleaner at small sizes than the full IWF stack. -->
  <rect width="512" height="512" rx="96" fill="#0E0E10"/>

  <!-- Head -->
  <circle cx="256" cy="216" r="124" fill="#3DDC84"/>

  <!-- Ears (outer + inner) -->
  <circle cx="168" cy="138" r="34" fill="#3DDC84"/>
  <circle cx="344" cy="138" r="34" fill="#3DDC84"/>
  <circle cx="168" cy="138" r="14" fill="#0E0E10"/>
  <circle cx="344" cy="138" r="14" fill="#0E0E10"/>

  <!-- Eyes -->
  <circle cx="212" cy="208" r="15" fill="#0E0E10"/>
  <circle cx="300" cy="208" r="15" fill="#0E0E10"/>
  <circle cx="216" cy="204" r="4" fill="#3DDC84"/>
  <circle cx="304" cy="204" r="4" fill="#3DDC84"/>

  <!-- Nose -->
  <path d="M 244 252 L 268 252 L 256 268 Z" fill="#0E0E10"/>

  <!-- Mouth -->
  <path d="M 256 268 L 256 282 M 232 288 Q 256 304 280 288"
        stroke="#0E0E10" stroke-width="5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Whiskers -->
  <g stroke="#0E0E10" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="152" y1="260" x2="206" y2="266"/>
    <line x1="152" y1="282" x2="206" y2="280"/>
    <line x1="306" y1="266" x2="360" y2="260"/>
    <line x1="306" y1="280" x2="360" y2="282"/>
  </g>

  <!-- Paws -->
  <circle cx="208" cy="372" r="28" fill="#3DDC84"/>
  <circle cx="304" cy="372" r="28" fill="#3DDC84"/>

  <!-- Barbell -->
  <rect x="70" y="368" width="372" height="8" rx="4" fill="#A8A8B0"/>

  <!-- Left side: 20 kg blue (outer) + 25 kg red (inner). Both vertically
       centered at y=372 to match the bar. -->
  <rect x="60" y="320" width="20" height="104" rx="4" fill="#3B82F6"/>
  <rect x="80" y="302" width="28" height="140" rx="5" fill="#EF4444"/>

  <!-- Right side: mirror -->
  <rect x="404" y="302" width="28" height="140" rx="5" fill="#EF4444"/>
  <rect x="432" y="320" width="20" height="104" rx="4" fill="#3B82F6"/>
</svg>
